<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word to PDF Converter</title>
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: #ffffff;
        }

        .container {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeInUp 0.6s ease-out;
        }

        .header h1 {
            text-align: center;
            background: linear-gradient(135deg, #fff, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .upload-area {
            border: 2px dashed #444;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.02);
        }

        .upload-area:hover { border-color: #d4af37; background: rgba(212,175,55,0.05); }

        .upload-icon {
            font-size: 3.5rem;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #252525;
            border-left: 4px solid #d4af37;
            display: none;
            animation: fadeInUp 0.4s ease;
        }

        .preview-section { 
            margin-top: 20px; 
            display: none; 
            animation: fadeInUp 0.5s ease;
        }

        .preview-content {
            background: #ffffff;
            color: #000;
            padding: 20px;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 14px;
        }

        .button-group { display: flex; gap: 15px; margin-top: 25px; }

        button {
            flex: 1; padding: 14px; border-radius: 10px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .convert-btn { background: #d4af37; color: #000; }
        .convert-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .convert-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }

        .reset-btn { background: transparent; border: 1px solid #444; color: #ccc; display: none; }

        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(0,0,0,0.2); border-top-color: #000;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Hidden PDF Export Styling - CRITICAL FIX */
        #pdf-export-node {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 210mm;
            background: white;
            color: black;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Word to PDF</h1>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <p>Click or Drag to upload .docx</p>
            <input type="file" id="fileInput" accept=".docx" style="display: none;">
        </div>

        <div class="file-info" id="fileInfo">
            <div id="fileName" style="color: #d4af37; font-weight: bold;"></div>
            <div id="fileSize" style="font-size: 0.8rem; color: #888;"></div>
        </div>

        <div class="preview-section" id="previewSection">
            <p style="margin-bottom: 5px; font-size: 0.9rem; color: #d4af37;">Preview:</p>
            <div class="preview-content" id="previewContent"></div>
        </div>

        <div class="button-group">
            <button class="convert-btn" id="convertBtn" disabled>Download PDF</button>
            <button class="reset-btn" id="resetBtn">Reset</button>
        </div>
    </div>

    <!-- This node is purely for PDF generation to avoid "Blank PDF" issues -->
    <div id="pdf-export-node"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const convertBtn = document.getElementById('convertBtn');
        const resetBtn = document.getElementById('resetBtn');
        const previewContent = document.getElementById('previewContent');
        const exportNode = document.getElementById('pdf-export-node');

        let currentFile = null;

        uploadArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file && file.name.endsWith('.docx')) {
                currentFile = file;
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileSize').textContent = (file.size/1024).toFixed(2) + ' KB';
                document.getElementById('fileInfo').style.display = 'block';
                convertBtn.disabled = false;
                resetBtn.style.display = 'block';

                const reader = new FileReader();
                reader.onload = async (e) => {
                    const result = await mammoth.convertToHtml({ arrayBuffer: e.target.result });
                    previewContent.innerHTML = result.value;
                    document.getElementById('previewSection').style.display = 'block';
                };
                reader.readAsArrayBuffer(file);
            }
        };

        convertBtn.onclick = async () => {
            convertBtn.disabled = true;
            convertBtn.innerHTML = '<span class="spinner"></span>';

            const reader = new FileReader();
            reader.onload = async (e) => {
                const result = await mammoth.convertToHtml({ arrayBuffer: e.target.result });
                
                // Injecting into a clean, hidden node for PDF generation
                exportNode.innerHTML = `
                    <div style="padding: 20mm; color: black !important; background: white !important; font-family: 'Times New Roman', serif;">
                        <style>p { margin-bottom: 10pt; }</style>
                        ${result.value}
                    </div>
                `;

                const opt = {
                    margin: 0,
                    filename: currentFile.name.replace('.docx', '.pdf'),
                    html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };

                try {
                    await html2pdf().set(opt).from(exportNode).save();
                } catch (err) {
                    alert("Error creating PDF");
                } finally {
                    exportNode.innerHTML = '';
                    convertBtn.disabled = false;
                    convertBtn.innerHTML = 'Download PDF';
                }
            };
            reader.readAsArrayBuffer(currentFile);
        };

        resetBtn.onclick = () => location.reload();
    </script>
</body>
</html>
