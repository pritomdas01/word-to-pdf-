<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word to PDF Converter</title>
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }

        .container {
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.95), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 50px;
            max-width: 700px;
            width: 100%;
            border: 1px solid #404040;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ffffff 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .header p {
            color: #b0b0b0;
        }

        .upload-area {
            border: 3px dashed #505050;
            border-radius: 18px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            background: linear-gradient(135deg, #252525 0%, #2d2d2d 100%);
            margin-bottom: 25px;
            transition: all 0.4s ease;
        }

        .upload-area:hover {
            border-color: #d4af37;
            background: linear-gradient(135deg, #2d2d2d 0%, #353535 100%);
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.2);
        }

        .upload-area.drag-over {
            border-color: #d4af37;
            background: linear-gradient(135deg, #353535 0%, #3d3d3d 100%);
            box-shadow: 0 15px 50px rgba(212, 175, 55, 0.3);
        }

        .upload-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            background: linear-gradient(135deg, #252525 0%, #2d2d2d 100%);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: none;
            border-left: 4px solid #d4af37;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            color: #d4af37;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 14px 25px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .convert-btn {
            background: linear-gradient(135deg, #d4af37 0%, #e6c547 100%);
            color: #1a1a1a;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .convert-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn {
            background: linear-gradient(135deg, #2d2d2d 0%, #353535 100%);
            color: #d4af37;
            border: 1.5px solid #d4af37;
            display: none;
        }

        .preview-section {
            margin-bottom: 25px;
            display: none;
            background: linear-gradient(135deg, #252525 0%, #2d2d2d 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #d4af37;
        }

        .preview-section.show {
            display: block;
        }

        .preview-content {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.95rem;
            color: #e0e0e0;
            line-height: 1.7;
            border: 1px solid #404040;
        }

        .message {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
            text-align: center;
        }

        .message.show { display: block; }
        .success { background: #1a3d1a; color: #7cfc00; border: 1px solid #4a7c4a; }
        .error { background: #3d1a1a; color: #ff6b6b; border: 1px solid #7c4a4a; }

        .footer {
            border-top: 1px solid #404040;
            padding-top: 20px;
            text-align: center;
            color: #888888;
            font-size: 0.9rem;
        }

        .footer a { color: #d4af37; text-decoration: none; font-weight: 600; }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-top: 2px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Word to PDF</h1>
            <p>Convert your Word documents to PDF instantly</p>
        </div>

        <div class="message" id="message"></div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Click or drag to upload</div>
            <div class="upload-subtext">Supported: .docx files</div>
            <input type="file" id="fileInput" accept=".docx">
        </div>

        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>

        <div class="preview-section" id="previewSection">
            <div class="preview-label" style="color: #d4af37; font-weight: 600; margin-bottom: 10px;">📋 Preview:</div>
            <div class="preview-content" id="previewContent"></div>
        </div>

        <div class="button-group">
            <button class="convert-btn" id="convertBtn" disabled>Convert to PDF</button>
            <button class="reset-btn" id="resetBtn">Reset</button>
        </div>

        <div class="footer">
            Made by <a href="https://portfolio-tawny-six-16.vercel.app/" target="_blank">Pritom</a>
        </div>
    </div>

    <!-- Hidden Worker for PDF generation -->
    <div id="pdfWorker" style="position: absolute; left: -9999px; top: 0; width: 700px; background: white; color: black; padding: 40px; display: none;"></div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const convertBtn = document.getElementById('convertBtn');
        const resetBtn = document.getElementById('resetBtn');
        const previewSection = document.getElementById('previewSection');
        const previewContent = document.getElementById('previewContent');
        const messageBox = document.getElementById('message');
        const pdfWorker = document.getElementById('pdfWorker');

        let selectedFile = null;

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = `message show ${type}`;
            setTimeout(() => messageBox.classList.remove('show'), 5000);
        }

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            if (e.dataTransfer.files[0]) handleFileSelect(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFileSelect(e.target.files[0]);
        });

        function handleFileSelect(file) {
            if (!file.name.toLowerCase().endsWith('.docx')) {
                showMessage('❌ Please upload a valid .docx file', 'error');
                return;
            }
            selectedFile = file;
            fileName.textContent = `📄 ${file.name}`;
            fileSize.textContent = `Size: ${(file.size / 1024).toFixed(2)} KB`;
            fileInfo.classList.add('show');
            convertBtn.disabled = false;
            resetBtn.style.display = 'block';
            previewFile(file);
        }

        async function previewFile(file) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const result = await mammoth.convertToHtml({ arrayBuffer: e.target.result });
                previewContent.innerHTML = result.value;
                previewSection.classList.add('show');
            };
            reader.readAsArrayBuffer(file);
        }

        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            convertBtn.disabled = true;
            convertBtn.innerHTML = '<span class="spinner"></span>Converting...';

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const result = await mammoth.convertToHtml({ arrayBuffer: e.target.result });
                    
                    // ব্ল্যাঙ্ক সমস্যা সমাধানের জন্য এখানে টেম্পোরারি কন্টেইনারে কন্টেন্ট ইনজেক্ট করা হচ্ছে
                    pdfWorker.style.display = 'block';
                    pdfWorker.innerHTML = result.value;

                    const opt = {
                        margin: 15,
                        filename: selectedFile.name.replace('.docx', '.pdf'),
                        image: { type: 'jpeg', quality: 0.98 },
                        html2canvas: { scale: 2, useCORS: true, logging: false },
                        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                    };

                    // html2pdf-কে কল করা
                    await html2pdf().set(opt).from(pdfWorker).save();
                    
                    showMessage('✓ PDF downloaded successfully!', 'success');
                } catch (err) {
                    showMessage('❌ Conversion failed!', 'error');
                } finally {
                    pdfWorker.style.display = 'none';
                    convertBtn.disabled = false;
                    convertBtn.innerHTML = 'Convert to PDF';
                }
            };
            reader.readAsArrayBuffer(selectedFile);
        });

        resetBtn.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.remove('show');
            previewSection.classList.remove('show');
            convertBtn.disabled = true;
            resetBtn.style.display = 'none';
        });
    </script>
</body>
</html>
