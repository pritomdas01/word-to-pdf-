<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word to PDF Converter</title>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }

        .container {
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.95), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 50px;
            max-width: 700px;
            width: 100%;
            border: 1px solid #404040;
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ffffff 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .header p {
            color: #b0b0b0;
            font-weight: 300;
        }

        .upload-area {
            border: 3px dashed #505050;
            border-radius: 18px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            background: linear-gradient(135deg, #252525 0%, #2d2d2d 100%);
            margin-bottom: 25px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }

        .upload-area:hover {
            border-color: #d4af37;
            background: linear-gradient(135deg, #2d2d2d 0%, #353535 100%);
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.2);
        }

        .upload-area:hover::before {
            opacity: 1;
        }

        .upload-area.drag-over {
            border-color: #d4af37;
            background: linear-gradient(135deg, #353535 0%, #3d3d3d 100%);
            box-shadow: 0 15px 50px rgba(212, 175, 55, 0.3);
        }

        .upload-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .upload-text {
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .upload-subtext {
            color: #888888;
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            background: linear-gradient(135deg, #252525 0%, #2d2d2d 100%);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: none;
            border-left: 4px solid #d4af37;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .file-info.show {
            display: block;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-name {
            color: #d4af37;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .file-size {
            color: #888888;
            font-size: 0.9rem;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 14px 25px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .convert-btn {
            background: linear-gradient(135deg, #d4af37 0%, #e6c547 100%);
            color: #1a1a1a;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .convert-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4);
        }

        .convert-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn {
            background: linear-gradient(135deg, #2d2d2d 0%, #353535 100%);
            color: #d4af37;
            border: 1.5px solid #d4af37;
            display: none;
        }

        .reset-btn:hover {
            background: linear-gradient(135deg, #353535 0%, #3d3d3d 100%);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.25);
        }

        .preview-section {
            margin-bottom: 25px;
            display: none;
            background: linear-gradient(135deg, #252525 0%, #2d2d2d 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #d4af37;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: slideIn 0.4s ease;
        }

        .preview-section.show {
            display: block;
        }

        .preview-label {
            color: #d4af37;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .preview-content {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.95rem;
            color: #e0e0e0;
            line-height: 1.7;
            border: 1px solid #404040;
        }

        .preview-content h1 {
            color: #d4af37;
            margin-top: 15px;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .preview-content h2 {
            color: #d4af37;
            margin-top: 12px;
            margin-bottom: 8px;
            font-size: 1.3rem;
        }

        .preview-content h3 {
            color: #c9a927;
            margin-top: 10px;
            margin-bottom: 8px;
        }

        .preview-content p {
            margin-bottom: 12px;
        }

        .preview-content strong {
            color: #d4af37;
        }

        .preview-content em {
            color: #b0b0b0;
        }

        .message {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
            animation: slideIn 0.4s ease;
        }

        .message.show {
            display: block;
        }

        .success {
            background: linear-gradient(135deg, #1a3d1a 0%, #2d5c2d 100%);
            color: #7cfc00;
            border: 1px solid #4a7c4a;
            box-shadow: 0 10px 30px rgba(124, 252, 0, 0.15);
        }

        .error {
            background: linear-gradient(135deg, #3d1a1a 0%, #5c2d2d 100%);
            color: #ff6b6b;
            border: 1px solid #7c4a4a;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.15);
        }

        .footer {
            border-top: 1px solid #404040;
            padding-top: 20px;
            text-align: center;
            color: #888888;
            font-size: 0.9rem;
        }

        .footer a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .footer a:hover {
            color: #e6c547;
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-top: 2px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #e6c547;
        }

        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 30px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

        </div>

            <div class="upload-subtext">Supported: .docx, .doc files</div>
            <input type="file" id="fileInput" accept=".docx,.doc">
        </div>

        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>

        <div class="preview-section" id="previewSection">
            <div class="preview-label">📋 Preview:</div>
            <div class="preview-content" id="previewContent"></div>
        </div>

        <div class="button-group">
            <button class="convert-btn" id="convertBtn" disabled>Convert to PDF</button>
            <button class="reset-btn" id="resetBtn">Reset</button>
        </div>

        <div class="footer">
            Made by <a href="https://portfolio-tawny-six-16.vercel.app/" target="_blank">Pritom</a>
        </div>
    </div>
