<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word to PDF Converter</title>
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: #ffffff;
        }
        .container {
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
            border-radius: 20px;
            padding: 40px;
            max-width: 650px;
            width: 90%;
            border: 1px solid #404040;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
        }
        .header h1 {
            font-size: 2rem;
            text-align: center;
            background: linear-gradient(135deg, #ffffff 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p { text-align: center; color: #b0b0b0; margin-bottom: 30px; }
        .upload-area {
            border: 2px dashed #505050;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-area:hover { border-color: #d4af37; background: #2d2d2d; }
        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #252525;
            border-radius: 10px;
            border-left: 4px solid #d4af37;
            display: none;
        }
        .preview-section {
            margin-top: 20px;
            display: none;
        }
        .preview-content {
            background: #fdfdfd; /* Preview in light mode for better visibility */
            color: #333;
            padding: 15px;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #444;
        }
        .button-group { display: flex; gap: 10px; margin-top: 25px; }
        button {
            flex: 1; padding: 12px; border-radius: 10px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .convert-btn { background: #d4af37; color: #1a1a1a; }
        .convert-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .reset-btn { background: transparent; border: 1px solid #d4af37; color: #d4af37; display: none; }
        .message { margin-top: 15px; text-align: center; padding: 10px; border-radius: 8px; display: none; }
        .success { background: #1a3d1a; color: #7cfc00; }
        .error { background: #3d1a1a; color: #ff6b6b; }
        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(0,0,0,0.1); border-top-color: #000;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Word to PDF</h1>
            <p>High Quality Instant Converter</p>
        </div>

        <div id="message" class="message"></div>

        <div class="upload-area" id="uploadArea">
            <div style="font-size: 3rem;">📁</div>
            <p>Drag or Click to upload .docx</p>
            <input type="file" id="fileInput" accept=".docx" style="display: none;">
        </div>

        <div class="file-info" id="fileInfo">
            <div id="fileName" style="font-weight: bold; color: #d4af37;"></div>
            <div id="fileSize" style="font-size: 0.8rem; color: #888;"></div>
        </div>

        <div class="preview-section" id="previewSection">
            <p style="margin-bottom: 5px; font-size: 0.9rem;">📋 Quick Preview:</p>
            <div class="preview-content" id="previewContent"></div>
        </div>

        <div class="button-group">
            <button class="convert-btn" id="convertBtn" disabled>Convert & Download</button>
            <button class="reset-btn" id="resetBtn">Reset</button>
        </div>
    </div>

    <!-- এই কন্টেইনারটা পিডিএফের জন্য স্পেশাল ফিক্স -->
    <div id="pdf-source" style="display: none;"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const convertBtn = document.getElementById('convertBtn');
        const resetBtn = document.getElementById('resetBtn');
        const previewContent = document.getElementById('previewContent');
        const messageBox = document.getElementById('message');

        let currentFile = null;

        uploadArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        };

        function handleFile(file) {
            if (!file.name.endsWith('.docx')) {
                alert('Only .docx files allowed!');
                return;
            }
            currentFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = (file.size/1024).toFixed(2) + ' KB';
            document.getElementById('fileInfo').style.display = 'block';
            convertBtn.disabled = false;
            resetBtn.style.display = 'block';
            
            // Preview
            const reader = new FileReader();
            reader.onload = async (e) => {
                const result = await mammoth.convertToHtml({ arrayBuffer: e.target.result });
                previewContent.innerHTML = result.value || 'No text found';
                document.getElementById('previewSection').style.display = 'block';
            };
            reader.readAsArrayBuffer(file);
        }

        convertBtn.onclick = async () => {
            convertBtn.disabled = true;
            convertBtn.innerHTML = '<span class="spinner"></span>Processing...';
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const result = await mammoth.convertToHtml({ arrayBuffer: e.target.result });
                    
                    // ফিক্সড কন্টেইনার তৈরি - যেখানে লেখাগুলো জোর করে কালো করা হয়েছে
                    const pdfSource = document.getElementById('pdf-source');
                    pdfSource.style.display = 'block';
                    pdfSource.innerHTML = `
                        <div id="capture" style="padding: 40px; background: white; color: black !important; font-family: Arial; line-height: 1.5;">
                            <style>
                                #capture * { color: black !important; } /* Force all text to black */
                                #capture h1, #capture h2 { margin-bottom: 10px; }
                                #capture p { margin-bottom: 8px; }
                            </style>
                            ${result.value}
                        </div>
                    `;

                    const opt = {
                        margin: 10,
                        filename: currentFile.name.replace('.docx', '.pdf'),
                        image: { type: 'jpeg', quality: 0.98 },
                        html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                    };

                    await html2pdf().set(opt).from(pdfSource).save();
                    
                    messageBox.textContent = "✓ Downloaded Successfully!";
                    messageBox.className = "message success show";
                    messageBox.style.display = "block";
                } catch (err) {
                    alert("Conversion error!");
                } finally {
                    document.getElementById('pdf-source').style.display = 'none';
                    convertBtn.disabled = false;
                    convertBtn.innerHTML = 'Convert & Download';
                }
            };
            reader.readAsArrayBuffer(currentFile);
        };

        resetBtn.onclick = () => location.reload();
    </script>
</body>
</html>
