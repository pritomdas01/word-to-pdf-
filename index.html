<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word to PDF Pro</title>
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0d0d0d;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #f0f0f0;
        }

        .container {
            background: #181818;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 92%;
            border: 1px solid #333;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeInUp 0.6s ease-out;
            position: relative;
        }

        .header h1 {
            text-align: center;
            font-size: 2rem;
            background: linear-gradient(135deg, #fff, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        .upload-area {
            border: 2px dashed #444;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.02);
        }

        .upload-area:hover { 
            border-color: #d4af37; 
            background: rgba(212,175,55,0.05);
        }

        .upload-icon {
            font-size: 3.5rem;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
            margin-bottom: 10px;
        }

        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #222;
            border-left: 4px solid #d4af37;
            border-radius: 8px;
            display: none;
        }

        .preview-section { 
            margin-top: 20px; 
            display: none; 
        }

        .preview-content {
            background: #fff;
            color: #000;
            padding: 15px;
            border-radius: 10px;
            max-height: 180px;
            overflow-y: auto;
            font-size: 13px;
            border: 1px solid #444;
        }

        .button-group { display: flex; gap: 12px; margin-top: 25px; }

        button {
            flex: 1; padding: 14px; border-radius: 10px; border: none;
            font-weight: 700; cursor: pointer; transition: 0.2s;
        }

        .convert-btn { background: #d4af37; color: #000; }
        .convert-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .convert-btn:hover:not(:disabled) { background: #e5be4a; transform: translateY(-2px); }

        .reset-btn { background: transparent; border: 1px solid #444; color: #888; display: none; }
        .reset-btn:hover { color: #fff; border-color: #d4af37; }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: #555;
            border-top: 1px solid #222;
            padding-top: 15px;
        }

        .footer a { color: #d4af37; text-decoration: none; font-weight: bold; }

        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(0,0,0,0.1); border-top-color: #000;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Word to PDF</h1>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <p>Tap to upload .docx</p>
            <input type="file" id="fileInput" accept=".docx" style="display: none;">
        </div>

        <div class="file-info" id="fileInfo">
            <div id="fileName" style="color: #d4af37; font-weight: bold; font-size: 0.9rem;"></div>
            <div id="fileSize" style="font-size: 0.75rem; color: #777;"></div>
        </div>

        <div class="preview-section" id="previewSection">
            <p style="margin-bottom: 6px; font-size: 0.85rem; color: #d4af37;">Preview (Scrollable):</p>
            <div class="preview-content" id="previewContent"></div>
        </div>

        <div class="button-group">
            <button class="convert-btn" id="convertBtn" disabled>Download PDF</button>
            <button class="reset-btn" id="resetBtn">Reset</button>
        </div>

        <div class="footer">
            Made by <a href="https://portfolio-tawny-six-16.vercel.app/" target="_blank">Pritom</a>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const convertBtn = document.getElementById('convertBtn');
        const resetBtn = document.getElementById('resetBtn');
        const previewContent = document.getElementById('previewContent');

        let htmlString = ""; 
        let currentFileName = "document.pdf";

        uploadArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file && file.name.endsWith('.docx')) {
                currentFileName = file.name.replace('.docx', '.pdf');
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileSize').textContent = (file.size/1024).toFixed(2) + ' KB';
                document.getElementById('fileInfo').style.display = 'block';
                
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const result = await mammoth.convertToHtml({ arrayBuffer: event.target.result });
                    htmlString = result.value; // Store HTML content
                    previewContent.innerHTML = htmlString;
                    document.getElementById('previewSection').style.display = 'block';
                    convertBtn.disabled = false;
                    resetBtn.style.display = 'block';
                };
                reader.readAsArrayBuffer(file);
            }
        };

        convertBtn.onclick = async () => {
            convertBtn.disabled = true;
            convertBtn.innerHTML = '<span class="spinner"></span> Working...';

            // PDF এর জন্য একদম ফ্রেশ একটা HTML র‍্যাপার তৈরি করা হচ্ছে
            const pdfTemplate = `
                <div style="padding: 20mm; background: white; color: black; font-family: 'Arial', sans-serif;">
                    <style>
                        p { margin-bottom: 10pt; line-height: 1.5; color: black !important; }
                        h1, h2, h3 { color: black !important; margin-top: 15pt; }
                        table { border-collapse: collapse; width: 100%; }
                        td, th { border: 1px solid #ccc; padding: 5px; }
                    </style>
                    ${htmlString}
                </div>
            `;

            const opt = {
                margin: 0,
                filename: currentFileName,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, useCORS: true, logging: false },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // সরাসরি স্ট্রিং থেকে পিডিএফ জেনারেট করা হচ্ছে
            html2pdf().set(opt).from(pdfTemplate).save().then(() => {
                convertBtn.disabled = false;
                convertBtn.innerHTML = 'Download PDF';
            }).catch(err => {
                alert("Error!");
                convertBtn.disabled = false;
                convertBtn.innerHTML = 'Download PDF';
            });
        };

        resetBtn.onclick = () => location.reload();
    </script>
</body>
</html>
