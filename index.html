<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word to PDF Converter</title>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }

        .container {
            background: #0a0a0a;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            padding: 50px;
            max-width: 700px;
            width: 100%;
            border: 1px solid #333333;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .header p {
            color: #cccccc;
        }

        .upload-area {
            border: 3px dashed #ffffff;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            background: #1a1a1a;
            margin-bottom: 25px;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #ffff00;
            background: #262626;
            transform: scale(1.02);
        }

        .upload-area.drag-over {
            border-color: #ffff00;
            background: #2d2d2d;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .upload-subtext {
            color: #999999;
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: none;
            border-left: 4px solid #ffffff;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .file-size {
            color: #999999;
            font-size: 0.9rem;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .convert-btn {
            background: #ffffff;
            color: #000000;
        }

        .convert-btn:hover:not(:disabled) {
            background: #ffff00;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.3);
        }

        .convert-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn {
            background: #1a1a1a;
            color: #ffffff;
            border: 2px solid #ffffff;
            display: none;
        }

        .reset-btn:hover {
            background: #2d2d2d;
            border-color: #ffff00;
            color: #ffff00;
        }

        .preview-section {
            margin-bottom: 25px;
            display: none;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #ffffff;
        }

        .preview-section.show {
            display: block;
        }

        .preview-label {
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .preview-content {
            background: #0a0a0a;
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.9rem;
            color: #e0e0e0;
            line-height: 1.6;
            border: 1px solid #333333;
        }

        .preview-content h1, .preview-content h2, .preview-content h3 {
            color: #ffffff;
            margin-top: 10px;
        }

        .preview-content p {
            margin-bottom: 10px;
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .success {
            background: #1a3d1a;
            color: #7cfc00;
            border: 1px solid #4a7c4a;
        }

        .error {
            background: #3d1a1a;
            color: #ff6b6b;
            border: 1px solid #7c4a4a;
        }

        .footer {
            border-top: 1px solid #333333;
            padding-top: 20px;
            text-align: center;
            color: #999999;
            font-size: 0.9rem;
        }

        .footer a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .footer a:hover {
            color: #ffff00;
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #ffffff;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ffff00;
        }

        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 30px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Word to PDF</h1>
            <p>Convert your Word documents to PDF instantly</p>
        </div>

        <div class="message" id="message"></div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Click or drag to upload</div>
            <div class="upload-subtext">Supported: .docx, .doc files</div>
            <input type="file" id="fileInput" accept=".docx,.doc">
        </div>

        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>

        <div class="preview-section" id="previewSection">
            <div class="preview-label">📋 Preview:</div>
            <div class="preview-content" id="previewContent"></div>
        </div>

        <div class="button-group">
            <button class="convert-btn" id="convertBtn" disabled>Convert to PDF</button>
            <button class="reset-btn" id="resetBtn">Reset</button>
        </div>

        <div class="footer">
            Made by <a href="https://portfolio-tawny-six-16.vercel.app/" target="_blank">Pritom</a>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const convertBtn = document.getElementById('convertBtn');
        const resetBtn = document.getElementById('resetBtn');
        const previewSection = document.getElementById('previewSection');
        const previewContent = document.getElementById('previewContent');
        const message = document.getElementById('message');

        let selectedFile = null;
        let fileHtmlContent = '';

        // Check if libraries are loaded
        window.addEventListener('load', () => {
            if (typeof mammoth === 'undefined') {
                showMessage('❌ Error loading libraries. Please refresh the page.', 'error');
            }
        });

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            if (e.dataTransfer.files[0]) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            if (!['application/vnd.openxmlformats-officedocument.wordprocessingml.document', 'application/msword'].includes(file.type)) {
                showMessage('❌ Please upload a valid Word document (.docx or .doc)', 'error');
                return;
            }

            selectedFile = file;
            fileName.textContent = `📄 ${file.name}`;
            fileSize.textContent = `Size: ${(file.size / 1024).toFixed(2)} KB`;
            fileInfo.classList.add('show');
            convertBtn.disabled = false;
            resetBtn.style.display = 'block';
            message.classList.remove('show');
            
            previewFile(file);
        }

        function previewFile(file) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    if (typeof mammoth === 'undefined') {
                        previewContent.innerHTML = '<p style="color: #ff6b6b;">Mammoth library not loaded</p>';
                        previewSection.classList.add('show');
                        return;
                    }
                    
                    const result = await mammoth.convertToHtml({ arrayBuffer: e.target.result });
                    fileHtmlContent = result.value;
                    previewContent.innerHTML = fileHtmlContent;
                    previewSection.classList.add('show');
                } catch (error) {
                    previewContent.innerHTML = '<p style="color: #ff6b6b;">Could not preview file: ' + error.message + '</p>';
                    previewSection.classList.add('show');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            if (typeof mammoth === 'undefined' || typeof html2pdf === 'undefined') {
                showMessage('❌ Libraries not loaded. Please refresh the page.', 'error');
                return;
            }

            convertBtn.disabled = true;
            convertBtn.innerHTML = '<span class="spinner"></span>Converting...';

            try {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const result = await mammoth.convertToHtml({ arrayBuffer: e.target.result });
                        const htmlContent = result.value;

                        const opt = {
                            margin: [10, 10, 10, 10],
                            filename: selectedFile.name.replace(/\.[^.]+$/, '.pdf'),
                            image: { type: 'jpeg', quality: 0.98 },
                            html2canvas: { scale: 2, useCORS: true },
                            jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
                        };

                        html2pdf().set(opt).from(htmlContent).save();
                        showMessage('✓ PDF converted successfully!', 'success');

                    } catch (error) {
                        showMessage('❌ Error: ' + error.message, 'error');
                    }

                    convertBtn.disabled = false;
                    convertBtn.innerHTML = 'Convert to PDF';
                };
                reader.readAsArrayBuffer(selectedFile);

            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'error');
                convertBtn.disabled = false;
                convertBtn.innerHTML = 'Convert to PDF';
            }
        });

        resetBtn.addEventListener('click', () => {
            selectedFile = null;
            fileHtmlContent = '';
            fileInput.value = '';
            fileInfo.classList.remove('show');
            previewSection.classList.remove('show');
            convertBtn.disabled = true;
            resetBtn.style.display = 'none';
            message.classList.remove('show');
        });

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message show ${type}`;
        }
    </script>
</body>
</html>
