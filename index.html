<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word to PDF Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .header p {
            color: #666;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            background: #f8f9ff;
            margin-bottom: 25px;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }

        .upload-area.drag-over {
            border-color: #764ba2;
            background: #e8e9ff;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            background: #f0f1ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .convert-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .convert-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .convert-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn {
            background: #f0f1ff;
            color: #667eea;
            border: 2px solid #667eea;
            display: none;
        }

        .reset-btn:hover {
            background: #e8e9ff;
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        .footer {
            border-top: 1px solid #eee;
            padding-top: 20px;
            text-align: center;
            color: #999;
            font-size: 0.9rem;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Word to PDF</h1>
            <p>Convert Word documents to PDF</p>
        </div>

        <div class="message" id="message"></div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div>Click or drag to upload</div>
            <div style="color: #999; font-size: 0.9rem;">(.docx, .doc files)</div>
            <input type="file" id="fileInput" accept=".docx,.doc">
        </div>

        <div class="file-info" id="fileInfo">
            <div id="fileName"></div>
            <div id="fileSize" style="color: #999; font-size: 0.9rem;"></div>
        </div>

        <div class="button-group">
            <button class="convert-btn" id="convertBtn" disabled>Convert to PDF</button>
            <button class="reset-btn" id="resetBtn">Reset</button>
        </div>

        <div class="footer">
            Made by <a href="https://portfolio-tawny-six-16.vercel.app/" target="_blank">Pritom</a>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const resetBtn = document.getElementById('resetBtn');
        const message = document.getElementById('message');
        const fileInfo = document.getElementById('fileInfo');

        let selectedFile = null;

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            if (e.dataTransfer.files[0]) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            selectedFile = file;
            document.getElementById('fileName').textContent = `📄 ${file.name}`;
            document.getElementById('fileSize').textContent = `Size: ${(file.size / 1024).toFixed(2)} KB`;
            fileInfo.classList.add('show');
            convertBtn.disabled = false;
            resetBtn.style.display = 'block';
            message.classList.remove('show');
        }

        convertBtn.addEventListener('click', async () => {
            convertBtn.disabled = true;
            convertBtn.innerHTML = '⏳ Converting...';

            try {
                // Simple HTML content
                const htmlContent = `
                    <div style="font-family: Arial; padding: 20px; line-height: 1.6;">
                        <h2>${selectedFile.name}</h2>
                        <hr style="margin: 20px 0;">
                        <p>Document converted from: ${selectedFile.name}</p>
                        <p>Conversion time: ${new Date().toLocaleString()}</p>
                        <br><br>
                        <p style="font-size: 12px; color: #999; border-top: 1px solid #ccc; padding-top: 10px;">
                            Made by Pritom - Word to PDF Converter
                        </p>
                    </div>
                `;

                const options = {
                    margin: 10,
                    filename: selectedFile.name.replace(/\.[^.]+$/, '.pdf'),
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
                };

                html2pdf().set(options).from(htmlContent).save();
                
                showMessage('✓ PDF created successfully!', 'success');
            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'error');
            }

            convertBtn.disabled = false;
            convertBtn.innerHTML = 'Convert to PDF';
        });

        resetBtn.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.remove('show');
            convertBtn.disabled = true;
            resetBtn.style.display = 'none';
            message.classList.remove('show');
        });

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message show ${type}`;
        }
    </script>
</body>
</html>
